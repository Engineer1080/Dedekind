name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Dedekind tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU-only PyTorch
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.0"

      - name: Install Dedekind (editable, with sci/plot/geo/ml/bio extras)
        run: |
          pip install -e ".[sci,plot,geo,ml,bio]"

      - name: Install OpenMM (best effort, used by md_simulate_lj_test)
        run: |
          pip install "openmm>=8.0" || echo "openmm unavailable on this runner; md test will skip"

      - name: Build ml_runtime.py
        run: |
          python src/dedekind/build_runtime.py

      - name: Run Dedekind mini-tests
        run: |
          python run_tests.py -q

  examples:
    name: Compile examples (Python 3.11)
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU-only PyTorch
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.0"

      - name: Install Dedekind (editable, with sci/plot/geo/ml/bio extras)
        run: |
          pip install -e ".[sci,plot,geo,ml,bio]"

      - name: Install OpenMM (best effort, used by md_simulate_lj_test)
        run: |
          pip install "openmm>=8.0" || echo "openmm unavailable on this runner; md test will skip"

      - name: Build ml_runtime.py
        run: |
          python src/dedekind/build_runtime.py

      - name: Compile all examples
        env:
          MPLBACKEND: Agg
        run: |
          python run_examples.py --compile -q

name: Dedekind CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Kompatibel mit gängigen ML/Torch Versionen
        cache: 'pip'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Build ml_runtime.py
      run: |
        python src/compiler/build_runtime.py
        
    - name: Run Dedekind Examples
      run: |
        python run_examples.py -q
